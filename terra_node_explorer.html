<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Terra — Journey Node Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f8f5;--surface:#ffffff;--surface2:#f3f1ec;--surface3:#e8e5de;
  --text:#1a1a18;--text2:#5c5b56;--text3:#9a9890;
  --border:#e2dfd7;--border2:#c8c4bc;
  --font:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
  --L:#2D6A4F;--Lbg:#eaf5ee;--Lt:#1a3d2c;
  --O:#6A4C93;--Obg:#f2edf9;--Ot:#3d2456;
  --A:#7427B5;--Abg:#f3eaff;--At:#471870;
  --S:#1565C0;--Sbg:#e8f0fc;--St:#0a3d78;
  --R:#B71C1C;--Rbg:#fdecea;--Rt:#6e0f0f;
  --D:#455A64;--Dbg:#eceff1;--Dt:#1c3640;
  --W:#00696C;--Wbg:#e0f5f5;--Wt:#003d3f;
  --radius:6px;--radius-lg:10px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141412;--surface:#1e1e1b;--surface2:#252521;--surface3:#2e2e29;
  --text:#e8e5dc;--text2:#9a9890;--text3:#636057;
  --border:#2e2e29;--border2:#3e3d38;
  --Lbg:#0e2018;--Lt:#6fcf97;
  --Obg:#1a1126;--Ot:#b39ddb;
  --Abg:#1a0f2e;--At:#c89ef8;
  --Sbg:#0a1a3a;--St:#90b4f0;
  --Rbg:#2a0a0a;--Rt:#f08080;
  --Dbg:#141c20;--Dt:#90a4ae;
  --Wbg:#001e1f;--Wt:#4dd0d5;
}}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
.app{display:grid;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}

/* Header */
.header{display:flex;align-items:center;gap:16px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface);position:relative;z-index:10}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:14px;height:14px;fill:var(--bg)}
.logo-title{font-size:14px;font-weight:600;letter-spacing:-0.01em}
.logo-sub{font-size:11px;color:var(--text3);margin-left:4px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.hbadge{font-size:10px;padding:3px 8px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-weight:500}

/* 3-panel layout */
.panels{display:grid;grid-template-columns:220px 1fr 380px;height:100%;overflow:hidden}
.panel-left{border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.panel-mid{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;position:relative}
.panel-right{border-left:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;transition:transform 0.25s cubic-bezier(0.2,0,0,1)}

/* Left panel — journey selector */
.panel-left-header{padding:12px 14px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-left-header h3{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3)}
.journey-list{overflow-y:auto;flex:1;padding:6px}
.journey-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 8px;border-radius:var(--radius);border:none;background:transparent;cursor:pointer;text-align:left;transition:background 0.12s;color:var(--text)}
.journey-btn:hover{background:var(--surface2)}
.journey-btn.active{background:var(--surface2)}
.jdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.jbtn-name{font-size:12px;font-weight:500;flex:1}
.jbtn-count{font-size:10px;color:var(--text3);background:var(--surface3);border-radius:10px;padding:1px 6px}
.journey-btn.active .jbtn-count{color:var(--text2)}

/* Middle panel — flow + nodes */
.panel-mid-header{padding:14px 20px 10px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;display:flex;align-items:center;gap:10px}
.journey-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.02em}
.journey-desc{font-size:12px;color:var(--text2)}
.node-count{margin-left:auto;font-size:11px;color:var(--text3)}

/* Flow chain */
.flow-scroll{overflow-y:auto;flex:1;padding:16px 20px}
.sub-section{margin-bottom:20px}
.sub-label{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding-left:22px}
.flow-chain{display:flex;flex-direction:column;gap:0}
.flow-item{display:flex;align-items:stretch;gap:0;position:relative}
.flow-connector{width:22px;display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.conn-top{width:1px;background:var(--border2);flex:1;min-height:12px}
.conn-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--border2);background:var(--surface);flex-shrink:0;margin:2px 0;z-index:1}
.conn-bot{width:1px;background:var(--border2);flex:1;min-height:12px}
.flow-item:first-child .conn-top{opacity:0}
.flow-item:last-child .conn-bot{opacity:0}
.flow-item.is-recovery .conn-dot{border-color:var(--jcolor, #888)}
.flow-item.is-exit .conn-bot{opacity:0}

.node-card{flex:1;padding:10px 12px;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all 0.15s;margin:2px 0;position:relative}
.node-card:hover{border-color:var(--border2);box-shadow:0 1px 6px rgba(0,0,0,0.06);transform:translateX(1px)}
.node-card.selected{border-color:var(--jcolor,#888);border-width:1.5px;background:var(--jbg,var(--surface))}
.node-card.selected::before{content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--jcolor,#888)}
.node-id{font-size:10px;font-weight:600;letter-spacing:0.05em;color:var(--jcolor,var(--text3));font-family:var(--mono)}
.node-name{font-size:13px;font-weight:500;color:var(--text);margin-top:1px}
.node-type-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.type-chip{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.node-preview{font-size:11px;color:var(--text2);margin-top:5px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Reentry badge */
.reentry-tag{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(244,162,97,0.15);color:#9a5a0a;border:1px solid rgba(244,162,97,0.3);font-weight:500}

/* Right panel — schema detail */
.panel-right-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:32px;text-align:center;color:var(--text3)}
.empty-icon{width:48px;height:48px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.empty-icon svg{width:20px;height:20px;opacity:0.4}
.empty-title{font-size:13px;font-weight:500;color:var(--text2)}
.empty-sub{font-size:11px;color:var(--text3);max-width:180px;line-height:1.5}

.schema-header{flex-shrink:0;padding:16px;border-bottom:1px solid var(--border)}
.schema-journey-tag{font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--jcolor2,var(--text3));margin-bottom:6px}
.schema-title{font-size:16px;font-weight:600;letter-spacing:-0.01em;line-height:1.3;color:var(--text)}
.schema-id{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:3px}
.schema-type-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.schema-chip{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid var(--border)}
.schema-chip.type{background:var(--jbg2,var(--surface2));color:var(--jcolor2,var(--text2))}
.schema-chip.sub{background:var(--surface2);color:var(--text2)}

.schema-body{overflow-y:auto;flex:1;padding:0}
.schema-section{padding:12px 16px;border-bottom:1px solid var(--border)}
.schema-section:last-child{border-bottom:none}
.section-label{font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.section-content{font-size:12px;color:var(--text2);line-height:1.6}
.kpi-list{display:flex;flex-wrap:wrap;gap:4px}
.kpi-tag{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.ts-list,.flag-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.ts-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--Sbg);color:var(--St);border:1px solid rgba(21,101,192,0.15);font-family:var(--mono)}
.flag-tag{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--surface2);color:var(--text3);border:1px solid var(--border);font-family:var(--mono)}
.conn-row{display:flex;flex-direction:column;gap:6px}
.conn-item{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text2)}
.conn-arrow{font-size:11px;color:var(--text3);flex-shrink:0;margin-top:1px;font-family:var(--mono)}
.loop-box{background:rgba(244,162,97,0.08);border:1px solid rgba(244,162,97,0.25);border-radius:var(--radius);padding:8px 10px;font-size:12px;color:var(--text2);line-height:1.5}
.no-loop{font-size:11px;color:var(--text3);font-style:italic}
.gap-box{background:var(--surface2);border-radius:var(--radius);padding:8px 10px;font-size:11px;color:var(--text2);line-height:1.55;border:1px solid var(--border)}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
<link rel="stylesheet" href="terra_shared.css"/>
</head>
<body>
<div class="app resizable-app">
  <header class="header resizable-header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 14 14"><path d="M7 1L13 4V10L7 13L1 10V4L7 1Z"/></svg>
      </div>
      <span class="logo-title">Terra</span>
      <span class="logo-sub">Journey Node Explorer</span>
    </div>
    <div class="top-nav-wrap"><nav class="top-nav"><a href="index.html">Node</a><a href="terra_node_explorer.html" class="active">Journey Node Explorer</a></nav></div>
    <div class="header-right">
      <span class="hbadge">26 nodes</span>
      <span class="hbadge">8 journey layers</span>
      <span class="hbadge">v2.0 · April 2026</span>
    </div>
  </header>

  <div class="panels resizable-panels" id="resizable-panels">
    <!-- Left: journey list -->
    <div class="panel-left">
      <div class="panel-left-header"><h3>Journeys</h3></div>
      <div class="journey-list" id="journey-list"></div>
    </div>

    <div class="resize-handle" id="left-resizer" aria-hidden="true"></div>

    <!-- Middle: flow diagram -->
    <div class="panel-mid">
      <div class="panel-mid-header" id="mid-header">
        <span class="journey-badge" id="mid-badge"></span>
        <span class="journey-desc" id="mid-desc"></span>
        <span class="node-count" id="mid-count"></span>
      </div>
      <div class="flow-scroll" id="flow-scroll"></div>
    </div>

    <div class="resize-handle" id="right-resizer" aria-hidden="true"></div>

    <!-- Right: schema detail -->
    <div class="panel-right" id="panel-right">
      <div class="panel-right-empty" id="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="14" height="14" rx="3"/>
            <line x1="7" y1="8" x2="13" y2="8"/>
            <line x1="7" y1="11" x2="11" y2="11"/>
          </svg>
        </div>
        <div class="empty-title">Select a node</div>
        <div class="empty-sub">Click any node in the flow to view its full schema, KPIs, timestamps, and connections</div>
      </div>
      <div id="schema-view" style="display:none;flex:1;display:none;flex-direction:column;overflow:hidden"></div>
    </div>
  </div>
</div>

<script>
const J={
  L:{id:"L",name:"Lead-to-Opp",abbrev:"L1–L4",color:"#2D6A4F",bg:"#eaf5ee",tc:"#1a3d2c",desc:"Lead creation through opp creation"},
  O:{id:"O",name:"Opportunity",abbrev:"O1–O5",color:"#6A4C93",bg:"#f2edf9",tc:"#3d2456",desc:"Pipeline from opp to Closed Won"},
  A:{id:"A",name:"Appointment",abbrev:"A1–A5",color:"#7427B5",bg:"#f3eaff",tc:"#471870",desc:"Booking through sit/held outcome"},
  S:{id:"S",name:"Sales",abbrev:"S1–S2",color:"#1565C0",bg:"#e8f0fc",tc:"#0a3d78",desc:"Sale event through confirmation"},
  R:{id:"R",name:"Retention",abbrev:"R1–R3",color:"#B71C1C",bg:"#fdecea",tc:"#6e0f0f",desc:"At-risk recovery and realization"},
  D:{id:"D",name:"Dialer",abbrev:"D1–D3",color:"#455A64",bg:"#eceff1",tc:"#1c3640",desc:"Parallel execution layer — all journeys"},
  W:{id:"W",name:"WFM Layer",abbrev:"W1–W2",color:"#00696C",bg:"#e0f5f5",tc:"#003d3f",desc:"Parallel capacity & effort layer"},
};

const SUBSECTIONS={
  L:["L1: Lead Creation to Sales Scope","L2: Working Path Selection","L3: Outreach & Attempts","L4: Contact to Opp/Appt Creation"],
  O:["O1–O4: Active Pipeline","O5: Recovery"],
  A:["A1–A4: Booking through Outcome","A5: Recovery"],
  S:["S1–S2: Sale to Fulfillment"],
  R:["R1–R3: At-Risk to Realization"],
  D:["D1–D3: Dialer Execution"],
  W:["W1–W2: Capacity & Adherence"],
};

const NODES=[
  {id:"L1.ENTRY",j:"L",name:"Lead Created / Loaded",sub:"L1",type:"Entry",
   desc:"Cohort anchor for all downstream analysis. Every velocity metric — speed-to-lead, time-to-contact, lead-to-opp days — is measured from this point. A lead can originate from marketing acquisition, web form, inbound call, purchased list, reactivated customer, batch load, or system automation.",
   kpis:["# Leads Created","Dialer-Eligible Rate","Lead-to-Dialer Lag","Duplicate Rate","Lead Volume by Source Mix (%)"],
   ts:["lead_created_date","dialer_load_date","marketing_drop_date","web_submission_date"],
   flags:["invalid_phone_flag","batch_lead_flag","dialer_eligible_flag","hold_out_flag","control_flag"],
   up:"Marketing Journey",dn:"L1.MID.QUALIFIED → L2.ENTRY | L1.EXIT.EXCLUDED | L1.EXIT.HOLD",
   loop:"Reactivated customers re-enter here as new lead records from Retention RP campaigns. Recycled leads from exhausted dialer campaigns may also re-enter if a new CRM lead is created.",
   gap:"Is the lead creation timestamp consistent across all sources? Are there leads in the dialer without CRM records? Are duplicates detected before or after creation?"},
  {id:"L1.MID.QUALIFIED",j:"L",name:"Sales Qualification Checkpoint",sub:"L1",type:"Mid-Point",
   desc:"The point where the business determines whether the lead is in active sales scope. This separates leads that will be actively pursued from those that won't, and is critical for calculating in-scope conversion rates.",
   kpis:["Sales Qualification Rate","Exclusion Rate by Reason","Time-to-Qualification","Requalification Rate"],
   ts:["qualification_date","dialer_sync_date"],
   flags:["dialer_eligible_flag","qualification_status","dialer_vs_non_dialer"],
   up:"L1.ENTRY",dn:"L2.ENTRY | L1.EXIT.EXCLUDED | L1.EXIT.HOLD",
   loop:"Leads in nurture/hold can re-qualify when conditions change (batch trigger, deadline approaching, score update) and re-enter at this node.",
   gap:"Is qualification happening explicitly (status field change) or implicitly (loaded into dialer = qualified)? Are there leads stuck indefinitely in a pre-qualification state?"},
  {id:"L1.EXIT.EXCLUDED",j:"L",name:"Lead Excluded / Out of Scope",sub:"L1",type:"Exit",
   desc:"The lead does not meaningfully enter the sales lifecycle — duplicate, invalid data, non-serviceable geography, compliance failure, or wrong segment. A real journey branch that should be tracked.",
   kpis:["# Excluded Leads","Exclusion Rate (%)","Exclusion by Reason Distribution","Invalid Contact Rate"],
   ts:["exclusion_date"],
   flags:["invalid_phone_flag","non_dialable_flag","control_flag"],
   up:"L1.MID.QUALIFIED",dn:"End state (some reversible → re-enter L1.MID.QUALIFIED)",
   loop:"Some exclusions can be reversed (data corrected, geography expanded) and re-enter at L1.MID.QUALIFIED.",
   gap:"Are excluded leads removed from reporting denominators? Are control/test leads correctly separated from true exclusions in analytics?"},
  {id:"L1.EXIT.HOLD",j:"L",name:"Lead in Nurture / Hold",sub:"L1",type:"Exit",
   desc:"The lead exists but is not ready for active sales work. Awaiting enrichment, held for timing, or in an automated nurture sequence. Distinct from exclusion — hold leads are expected to eventually become sales-eligible.",
   kpis:["# Leads in Hold","Hold Duration","Hold-to-Active Conversion Rate","Hold Aging Distribution"],
   ts:["hold_entry_date","scheduled_callback_date"],
   flags:["hold_out_flag","scheduled_callback_flag"],
   up:"L1.MID.QUALIFIED",dn:"L1.MID.QUALIFIED (re-qualifies later) | L1.EXIT.EXCLUDED (expires)",
   loop:"Batch triggers, deadline dates, or score changes can move hold leads back to qualified. This is a standard re-loop, not an exception.",
   gap:"Are hold leads included in lead-created counts but excluded from in-scope conversion denominators? Is there a maximum hold duration?"},
  {id:"L2.ENTRY",j:"L",name:"Working Path Selection",sub:"L2",type:"Entry",
   desc:"Sales-qualified lead routed to dialer, assigned rep, direct mid-funnel, or delayed queue. This branching point determines the entire downstream execution model.",
   kpis:["Working Path Distribution (%)","Routing Lag","Zero-Attempt Rate","Path Change Rate"],
   ts:["routing_decision_date","dialer_load_date","hopper_entry_date"],
   flags:["dialer_eligible_flag","dialer_vs_non_dialer","zero_attempt_flag"],
   up:"L1.MID.QUALIFIED",dn:"L2.EXIT.DIALER | L2.EXIT.ASSIGNED | L2.EXIT.DIRECT | L2.EXIT.DELAYED",
   loop:"Assigned leads not progressing can be re-routed to dialer path. Dialer leads with high-value signals can be pulled to assigned rep.",
   gap:"Is the routing decision recorded explicitly or inferred from which system the lead appears in? Are there qualified leads that never appear in any working path?"},
  {id:"L2.EXIT.DIALER",j:"L",name:"Routed to Dialer Path",sub:"L2",type:"Exit",
   desc:"Lead marked dialer-eligible and queued for outbound working. Loaded into the dialer system and worked through a structured contact strategy with defined attempt caps, recycle intervals, and disposition rules.",
   kpis:["# Leads Loaded to Dialer","Load Lag (qualification to dialer)","Zero-Attempt Rate"],
   ts:["dialer_load_date","hopper_entry_date"],
   flags:["zero_attempt_flag","dialer_eligible_flag"],
   up:"L2.ENTRY",dn:"L3.ENTRY",loop:"",
   gap:"Are there leads marked dialer-eligible that never appear in the dialer system? Are zero-attempt leads tracked as a gap metric?"},
  {id:"L2.EXIT.ASSIGNED",j:"L",name:"Routed to Assigned Rep Path",sub:"L2",type:"Exit",
   desc:"Lead assigned to direct rep or advisor. Exists for named-rep models, inbound-led selling, high-value leads, or compliance-restricted leads that cannot be auto-dialed.",
   kpis:["# Leads Assigned to Reps","Assignment-to-First-Contact Lag","Assigned vs Dialer Conversion Rate"],
   ts:["assignment_date","first_manual_interaction_date"],
   flags:["manual_path_flag","no_touch_flag"],
   up:"L2.ENTRY",dn:"L3.ENTRY | L2.EXIT.DIALER (if not progressing)",
   loop:"Assigned leads not progressing within SLA can be escalated to dialer path.",
   gap:"Are assigned-path leads tracked with the same rigor as dialer leads? Is there attempt/contact tracking for manual workflows?"},
  {id:"L3.ENTRY",j:"L",name:"Active Working Record Created",sub:"L3",type:"Entry",
   desc:"An operational work item now exists for this lead — dialer record or rep task. The contact strategy clock starts here.",
   kpis:["# Working Records Created","Records per Lead ratio","Working Record Creation Lag"],
   ts:["dialer_load_date","hopper_entry_date"],
   flags:["primary_working_record_flag"],
   up:"L2.EXIT.DIALER or L2.EXIT.ASSIGNED",dn:"L3.MID.FIRST_ATTEMPT",loop:"",
   gap:"Is there a gap between record creation and active working? Are there working records with no subsequent attempts?"},
  {id:"L3.MID.FIRST_ATTEMPT",j:"L",name:"First Outreach Attempt",sub:"L3",type:"Mid-Point",
   desc:"Speed-to-lead measurement point. Time from entry to first attempt is one of the strongest predictors of contact and conversion. Every minute of delay reduces reachability.",
   kpis:["Speed-to-Lead (minutes/hours)","SLA Compliance Rate","First-Attempt Connect Rate","First-Attempt Contact Rate","Lead Age at First Attempt"],
   ts:["first_attempt_date","first_autodial_attempt_date"],
   flags:["sla_compliant_flag","first_connected_flag","first_contacted_flag","first_attempt_autodial_flag"],
   up:"L3.ENTRY",dn:"L3.MID.SUBSEQUENT_ATTEMPTS or L3.MID.CONTACT",loop:"",
   gap:"Are there leads with a working record but no first attempt? Is speed-to-lead SLA in business hours or calendar hours?"},
  {id:"L3.MID.CONTACT",j:"L",name:"Meaningful Contact Made",sub:"L3",type:"Mid-Point",
   desc:"A meaningful conversation with the right party (decision-maker). Distinct from a connection. Contact is the pivotal moment where the business gets its chance to qualify the lead.",
   kpis:["Contact Rate","Contacts per Connect","Contact-to-Opp Rate","First Contact Attempt #","Duration-Qualified Contact Rate"],
   ts:["first_contact_date"],
   flags:["ever_contacted_flag","ever_connected_flag","duration_qualified_flag"],
   up:"L3.MID.FIRST_ATTEMPT or SUBSEQUENT_ATTEMPTS",dn:"L4.ENTRY",loop:"",
   gap:"Is the contact definition consistent between dialer disposition and actual conversation quality?"},
  {id:"L3.EXIT.EXHAUSTED",j:"L",name:"Attempts Exhausted",sub:"L3",type:"Exit",
   desc:"Lead has reached the maximum attempt cap without achieving a target outcome. One of the most common exit points. Whether truly unreachable or simply under-worked is a key analytical question.",
   kpis:["# Leads Exhausted","Exhaustion Rate (%)","Lead Score of Exhausted Leads","Exhausted Lead Recycle Rate"],
   ts:["last_attempt_date","exhaustion_date"],
   flags:["max_attempts_reached_flag"],
   up:"L3.MID.SUBSEQUENT_ATTEMPTS",dn:"Recycle cooldown → new campaign → re-enters L3.ENTRY | Permanent end state",
   loop:"Recycled leads re-enter with a new attempt cap after a cooldown period. Same CRM lead persists; a new dialer record is created.",

let selJ="L", selN=null;

function tc(j){return `var(--${j})`}
function bg(j){return `var(--${j}bg)`}
function lt(j){return `var(--${j}t)`}

function buildLeft(){
  const el=document.getElementById("journey-list");
  el.innerHTML=Object.values(J).map(j=>`
    <button class="journey-btn ${selJ===j.id?"active":""}" onclick="selectJourney('${j.id}')">
      <span class="jdot" style="background:${j.color}"></span>
      <span class="jbtn-name">${j.name}</span>
      <span class="jbtn-count">${NODES.filter(n=>n.j===j.id).length}</span>
    </button>`).join("");
}

function buildMid(){
  const j=J[selJ];
  // Header
  document.getElementById("mid-badge").innerHTML=`<span class="jdot" style="background:${j.color};width:6px;height:6px;margin-right:2px"></span> ${j.name} · ${j.abbrev}`;
  document.getElementById("mid-badge").style.background=j.bg;
  document.getElementById("mid-badge").style.color=j.tc;
  document.getElementById("mid-desc").textContent=j.desc;
  const count=NODES.filter(n=>n.j===selJ).length;
  document.getElementById("mid-count").textContent=`${count} node${count!==1?"s":""}`;
  // Flow
  const scroll=document.getElementById("flow-scroll");
  const subs=JOURNEY_SUBSECTIONS[selJ]||[];
  scroll.innerHTML=subs.map(sub=>{
    const nodeIds=SUBSECTION_MAP[sub.key]||[];
    const nodes=nodeIds.map(id=>NODES.find(n=>n.id===id)).filter(Boolean);
    return `<div class="sub-section">
      <div class="sub-label">${sub.label}</div>
      <div class="flow-chain" style="--jcolor:${j.color}">
        ${nodes.map((n,i)=>`
          <div class="flow-item ${RECOVERY_NODES.has(n.id)?"is-recovery":""} ${EXIT_NODES.has(n.id)?"is-exit":""}">
            <div class="flow-connector">
              <div class="conn-top"></div>
              <div class="conn-dot" style="${selN&&selN.id===n.id?`border-color:${j.color};background:${j.color}`:""}"></div>
              <div class="conn-bot"></div>
            </div>
            <div class="node-card ${selN&&selN.id===n.id?"selected":""}" 
                 style="${selN&&selN.id===n.id?`--jcolor:${j.color};--jbg:${j.bg}`:""}"
                 onclick="selectNode('${n.id}')">
              <div class="node-id" style="color:${j.color}">${n.id}</div>
              <div class="node-name">${n.name}</div>
              <div class="node-type-row">
                <span class="type-chip">${n.type}</span>
                <span class="type-chip">${n.sub}</span>
                ${RECOVERY_NODES.has(n.id)?'<span class="reentry-tag">↺ recovery</span>':""}
              </div>
              <div class="node-preview">${n.desc}</div>
            </div>
          </div>`).join("")}
      </div>
    </div>`;
  }).join("");
}

function buildRight(node){
  const empty=document.getElementById("empty-state");
  const view=document.getElementById("schema-view");
  if(!node){
    empty.style.display="flex";
    view.style.display="none";
    return;
  }
  empty.style.display="none";
  view.style.display="flex";
  const j=J[node.j];
  view.innerHTML=`
    <div class="schema-header">
      <div class="schema-journey-tag" style="color:${j.color}">${j.name} Journey · ${node.sub}</div>
      <div class="schema-title">${node.name}</div>
      <div class="schema-id">${node.id}</div>
      <div class="schema-type-row">
        <span class="schema-chip type" style="background:${j.bg};color:${j.tc}">${node.type}</span>
        <span class="schema-chip sub">${node.j} Journey</span>
        ${RECOVERY_NODES.has(node.id)?'<span class="schema-chip sub" style="background:rgba(244,162,97,0.1);color:#9a5a0a;border-color:rgba(244,162,97,0.3)">↺ Recovery node</span>':""}
      </div>
    </div>
    <div class="schema-body">
      <div class="schema-section">
        <div class="section-label">Description</div>
        <div class="section-content">${node.desc}</div>
      </div>
      <div class="schema-section">
        <div class="section-label">KPIs &amp; Measures</div>
        <div class="kpi-list">${node.kpis.map(k=>`<span class="kpi-tag">${k}</span>`).join("")}</div>
      </div>
      <div class="schema-section">
        <div class="section-label">Key Timestamps</div>
        <div class="ts-list">${node.ts.map(t=>`<span class="ts-tag">${t}</span>`).join("")}</div>
      </div>
      <div class="schema-section">
        <div class="section-label">Flags &amp; Indicators</div>
        <div class="flag-list">${node.flags.map(f=>`<span class="flag-tag">${f}</span>`).join("")}</div>
      </div>
      <div class="schema-section">
        <div class="section-label">Connections</div>
        <div class="conn-row">
          <div class="conn-item"><span class="conn-arrow">↑ from</span><span>${node.up}</span></div>
          <div class="conn-item"><span class="conn-arrow">↓ to</span><span>${node.dn}</span></div>
        </div>
      </div>
      <div class="schema-section">
        <div class="section-label">Re-Loop Paths</div>
        ${node.loop?`<div class="loop-box">↺ ${node.loop}</div>`:`<div class="no-loop">No direct re-loops from this node.</div>`}
      </div>
      <div class="schema-section">
        <div class="section-label">Onboarding Gap Questions</div>
        <div class="gap-box">${node.gap}</div>
      </div>
    </div>`;
}

window.selectJourney=function(id){
  selJ=id;selN=null;
  buildLeft();buildMid();buildRight(null);
};

window.selectNode=function(id){
  const n=NODES.find(x=>x.id===id);
  if(!n) return;
  // If node is in a different journey, switch journey first
  if(n.j!==selJ){selJ=n.j;buildLeft();}
  selN=n;
  buildMid();
  buildRight(n);
  // Scroll node into view
  setTimeout(()=>{
    const el=document.querySelector(`.node-card.selected`);
    if(el) el.scrollIntoView({behavior:"smooth",block:"nearest"});
  },50);
};

// Init
buildLeft();buildMid();buildRight(null);
</script>
</body>
</html>
